<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Computer</title>
    <link rel="stylesheet" href="style.css?v=5">

</head>
<body>
    <div class="box">
        <h1>Add Computer</h1>

        <div class="form">

            <form method="post" action="add.php">

                    <label for="comID">Computer ID</label> 
                    <input type="number" id="comID" name="comID" placeholder="ex. 01" required>

                    <label for="mem">RAM (Memory)</label> 
                    <input type="number" id="mem" name="mem" placeholder="in GB e.g. 16">

                    <label for="processor">Processor</label> 
                    <input type="text" name="processor" id="processor" placeholder="Intel/AMD">


                    <label for="status">Computer Status</label>
                    <select name="status" id="status">
                        <option>Select Status</option>
                        <option value="Available">Available</option>
                        <option value="In Use">In Use</option>
                    </select>

                    <label for="os">Operating system</label> 
                    <select name="os" id="os">
                        <option>Select OS</option>
                        <option value="Windows">Windows</option>
                        <option value="macOS">macOS</option>
                        <option value="Linux">Linux</option>
                        <option value="other">other</option>
                    </select>
                    
                    <label>Select storage type</label> 
                    <label><input type="checkbox" id="ssd" name="storage" value="ssd">SSD</label>
                    <label><input type="checkbox" id="hdd" name="storage" value="hdd">HDD</label>
                    <label><input type="checkbox" id="hybrid" name="storage" value="hybrid">Hybrid</label>

                    <label>Network Connectivity</label> 
                    <label><input type="radio" name="net" id="wired" value="wired">Wired</label>
                    <label><input type="radio" name="net" id="wireless" value="wireless">wireless</label>

                    <label for="loc">Location</label> 
                    <input type="text" name="loc" id="loc" placeholder="e.g. Lab1 ">

                    <label for="price">Purchase price</label> 
                    <input type="number" name="price" id="price">

                    <label for="purchaseDate">Purchase Date</label> 
                    <input type="date" name="purchaseDate" id="purchaseDate">

                    <label for="warrantyExp">Warranty Expiry Date</label> 
                    <input type="date" name="warrantyExp" id="warrantyExp">

                    <label for="maintenanceDate">Last maintenance Date</label> 
                    <input type="date" name="maintenanceDate" id="maintenanceDate">

                    <label for="supplier">Supplier Name and Address</label> 
                    <input type="text" id="supplier" name="supplier" placeholder="Name, Address">

                    <label for="color">Color</label> 
                    <input type="color" name="color" id="color">

                    <label for="password">Enter Password for Computer</label> 
                    <input type="password" name="password" id="password">

                    <label for="notes">Additional Notes</label> 
                    <textarea name="notes" id="notes"></textarea>

                <input type="submit" value="Add computer">
                <input type="reset" value="reset Form">

            </form>
        </div>
    </div>
</body>
</html>
